name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Scarica il progetto
        uses: actions/checkout@v7

      - name: Configura Java 17
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compila APK
        shell: bash
        run: |
          GRADLEW="$(find . -maxdepth 3 -type f -name gradlew -print -quit)"

          if [ -z "$GRADLEW" ]; then
            echo "Errore: il file gradlew non è stato trovato."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$GRADLEW")"
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Salva APK
        uses: actions/upload-artifact@v7
        with:
          name: SCiOMaterialMemoryAndroid-debug-APK
          path: "**/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
          retention-days: 30
